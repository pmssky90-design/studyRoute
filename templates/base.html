<!doctype html>
<html lang="${language}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="naver-site-verification" content="bec1fc7262251d89c4a24aae86a2220633297a21" />
    <title>${title}</title>
    <meta name="description" content="${description}">
    <link rel="canonical" href="${canonical_url}">
    <link rel="icon" href="${favicon_ico_path}" sizes="any">
    <link rel="icon" href="${favicon_png_path}" type="image/png" sizes="32x32">
    <link rel="icon" href="${favicon_path}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="${apple_touch_icon_path}" sizes="180x180">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="${site_name}">
    <meta property="og:title" content="${og_title}">
    <meta property="og:description" content="${og_description}">
    <meta property="og:url" content="${og_url}">
    <meta property="og:image" content="${og_image}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="${twitter_title}">
    <meta name="twitter:description" content="${twitter_description}">
    <meta name="twitter:image" content="${twitter_image}">

    <script type="application/ld+json">
${json_ld}
    </script>
    <link rel="stylesheet" href="${stylesheet_path}">
    <script src="${search_script_path}" defer></script>
  </head>
  <body class="${body_class}">
${header}
${breadcrumb}
    <main id="main-content">
${content}
    </main>
${footer}
  </body>
</html>
